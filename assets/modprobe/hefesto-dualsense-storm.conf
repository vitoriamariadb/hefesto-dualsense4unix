# hefesto-dualsense4unix — cura de RAIZ do storm -71 do DualSense (camada snd-usb-audio).
#
# O QUE FAZ: torna o probe do mixer UAC do DualSense TOLERANTE (ignore_ctl_error)
# e ESPAÇA os control-transfers no EP0 (ctl_msg_delay_1m, ~1-2 ms) — a rajada que,
# na re-enumeração sob carga, colide com o `usbhid` anexando a interface HID e
# gera "usbhid ...: can't add hid device: -71" (EPROTO) → USB disconnect em loop.
#
# PRESERVA mic (If2) E fone do jack (If1): NÃO desliga o áudio, NÃO deautoriza
# interface, NÃO troca profile do card. É a alternativa que MANTÉM os dois áudios —
# oposto da regra 75 (assets/75-ps5-controller-disable-usb-audio.rules), que é
# áudio-off total e fica FORA por decisão de produto.
#
# ESCOPO: só o VID:PID do DualSense (054c:0ce6) e DualSense Edge (054c:0df2). NÃO
# afeta nenhuma outra placa de áudio USB (é per-dispositivo, não global).
#
# ORTOGONAL ao usbcore.quirks=054c:0ce6:gn (cmdline, domínio do install_usb_quirk.sh
# / Ritual-Aurora): módulos e parâmetros diferentes — SOMAM, não conflitam. O `gn`
# espaça a enumeração no USB-core; este trata a camada de ÁUDIO (snd-usb-audio).
#
# REVERSÍVEL: apague este arquivo + replugue o controle (ou recarregue o módulo).
# Aplicar a quente (sem reboot): escrever o mesmo valor em
#   /sys/module/snd_usb_audio/parameters/quirk_flags  e replugar o controle.
# Instalado/removido por scripts/install_snd_quirk.sh (default no install.sh).
#
# Flags usadas (nomes; o kernel resolve o bit em qualquer versão):
#   ignore_ctl_error  — tolera erro de leitura do mixer (o card sobe com defaults
#                       em vez de abortar/cascatear a re-enumeração).
#   ctl_msg_delay_1m  — insere ~1-2 ms entre control-messages (des-raja o EP0).
# Escalar para ctl_msg_delay_5m só se o teste A/B mostrar -71 residual; NUNCA usar
# ctl_msg_delay puro (20 ms) como padrão — pode alongar a janela frágil e piorar.
options snd_usb_audio quirk_flags=054c:0ce6:ignore_ctl_error|ctl_msg_delay_1m,054c:0df2:ignore_ctl_error|ctl_msg_delay_1m
