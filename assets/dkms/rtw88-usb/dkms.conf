# dkms.conf — hefesto-rtw88-usb (Onda W)
# Módulo rtw88_usb patchado (vanilla v7.0.11 + patch/0001 memleak backport +
# patch/0002 device-gone/port-reset): detecta device removido/travado
# (padrão do rtw89: -ENODEV/-ESHUTDOWN imediato; -EPROTO só após >4 erros
# consecutivos), silencia o teardown contra hardware morto e enfileira
# usb_queue_reset_device() — a cura automática do fantasma USB de 13h.
# Instala em updates/dkms, que vence o in-tree automaticamente
# (/etc/depmod.d/ubuntu.conf: "search updates ubuntu built-in").
# Os headers rtw88 (main.h, reg.h, ...) vêm JUNTO no pacote: linux-headers
# não os traz; os símbolos do rtw88_core resolvem pelo Module.symvers que o
# linux-headers JÁ traz (CRCs de todos os módulos in-tree).
PACKAGE_NAME="hefesto-rtw88-usb"
PACKAGE_VERSION="1.0.0"
BUILT_MODULE_NAME[0]="rtw88_usb"
DEST_MODULE_LOCATION[0]="/updates/dkms"
AUTOINSTALL="yes"
# Pino de ABI: os headers privados do rtw88 empacotados aqui são os do
# v7.0.11. Compilar contra outro kernel poderia LINKAR limpo e corromper
# memória em runtime se o layout de struct rtw_dev mudar (diferente do
# hid-nintendo, que é autocontido). Kernel novo ⇒ dkms PULA o build
# (fail-safe: o in-tree volta, nunca sem WiFi) até o ritual de rebase
# (patch/BASELINE) atualizar headers + este pino juntos.
# Pino no BUILD EXATO validado (76070011), não só na versão nominal 7.0.11:
# o layout de `struct rtw_dev` é congelado no nosso main.h e o offset de
# `rtw_get_usb_priv()` é resolvido em tempo de compilação (static inline, sem
# CRC de modversions). Um respin da MESMA 7.0.11 com struct diferente linkaria
# limpo e corromperia memória em runtime. Casar só o build validado faz o DKMS
# PULAR qualquer outro kernel (respin ou série nova) → o in-tree assume sozinho
# (fail-safe); a cura volta quando revalidarmos e bumparmos a BASELINE.
BUILD_EXCLUSIVE_KERNEL="^7\.0\.11-76070011-"
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"
