# dkms.conf — hefesto-hid-nintendo (Onda T)
# Módulo hid-nintendo patchado (v7.0.11 + patch/0001-*.patch): probe BT com
# retry opcional, sem TX após esgotar o rate-limit, e limiares como module
# params. Instala em updates/dkms, que vence o in-tree automaticamente
# (/etc/depmod.d/ubuntu.conf: "search updates ubuntu built-in").
PACKAGE_NAME="hefesto-hid-nintendo"
PACKAGE_VERSION="1.0.0"
BUILT_MODULE_NAME[0]="hid-nintendo"
DEST_MODULE_LOCATION[0]="/updates/dkms"
AUTOINSTALL="yes"
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"
