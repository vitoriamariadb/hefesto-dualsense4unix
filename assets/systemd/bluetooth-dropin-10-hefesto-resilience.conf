# hefesto-dualsense4unix — drop-in de resiliência do bluetooth.service.
# Instalado em /etc/systemd/system/bluetooth.service.d/10-hefesto-resilience.conf
# (sprint 2026-07-21-sprint-pesquisa-bluez-estabilidade.md, camada 2).
#
# - Restart=on-failure JÁ vem ativo no pacote bluez desta máquina (medido via
#   `systemctl cat bluetooth.service` em 22/07) — reafirmado aqui de propósito,
#   porque o template UPSTREAM traz a linha comentada e um bump futuro do
#   pacote pode regredir isso silenciosamente.
# - WatchdogSec cobre o caso que Restart=on-failure NÃO cobre: bluetoothd VIVO
#   mas travado (busy-loop upstream #784). O bluetoothd suporta sd_notify
#   watchdog (o template upstream traz "#WatchdogSec=10"); 30s é conservador —
#   valores agressivos (1s) têm custo real de CPU documentado no systemd-devel.
# - ExecStopPost fotografa os bonds a cada parada do serviço (inclusive por
#   crash) — par do timer periódico hefesto-bt-bonds-snapshot.timer. O script
#   NUNCA fotografa estado vazio (não sobrescreve backup bom com pós-crash).
#
# Vale a partir do PRÓXIMO (re)start do bluetoothd; o install faz só
# daemon-reload (nunca reinicia o serviço — derrubaria os controles BT).
[Service]
Restart=on-failure
RestartSec=2
WatchdogSec=30
ExecStopPost=-/usr/local/lib/hefesto-dualsense4unix/bt_bonds_snapshot.sh --quiet
# BT-NINTENDO-ACTIVE-01: a cada (re)start do bluetoothd, deixa o rádio amigável
# aos controles Nintendo — nome "Nintendo*" (o Pro checa o nome do host p/ sair
# do sniff frágil) + link policy default sem SNIFF (LM recusa LMP_sniff_req).
# Cura de raiz da queda do Pro/8BitDo sob carga (pesquisa 2026-07-22). '-' =
# não-fatal (adaptador pode não estar pronto no start; o watchdog reafirma).
ExecStartPost=-/usr/local/lib/hefesto-dualsense4unix/bt_active_mode.sh --quiet
