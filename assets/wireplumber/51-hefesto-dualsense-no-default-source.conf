# Hefesto - Dualsense4Unix — FEAT-WIREPLUMBER-DUALSENSE-NOT-DEFAULT-SOURCE-01
#
# Impede o microfone do DualSense (placa de áudio USB do controle) de virar a
# FONTE de entrada padrão do sistema ao conectar — sintoma relatado: "o controle
# fica diminuindo/mexendo no microfone". Em vez de desabilitar o dispositivo (o
# que tornaria o mic/fone do controle inutilizável), apenas REBAIXA a prioridade
# para que ele nunca seja eleito default automaticamente; continua disponível
# para seleção manual.
#
# WirePlumber >= 0.5 (formato SPA-JSON em ~/.config/wireplumber/wireplumber.conf.d/).
# O reset da fonte padrão já persistida é feito por
# scripts/fix_wireplumber_default_source.sh (instalado junto pelo install.sh
# --with-wireplumber-fix, ou via scripts/doctor.sh --fix).
#
# Para DESABILITAR de vez (em vez de só rebaixar), comente as linhas de
# priority/ dont-reconnect e descomente `node.disabled = true`.

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_input.*[Dd]ual[Ss]ense.*" }
      { device.name = "~alsa_card.*[Dd]ual[Ss]ense.*" }
    ]
    actions = {
      update-props = {
        priority.session = 50
        priority.driver = 50
        node.dont-reconnect = true
        # node.disabled = true
      }
    }
  }
]
