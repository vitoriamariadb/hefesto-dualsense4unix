# Hefesto - Dualsense4Unix — FEAT-WIREPLUMBER-DISABLE-SOURCE-MODE-01
#
# DESABILITA (node.disabled = true) a FONTE de captura (microfone) do DualSense.
# Diferente do 51 (que só REBAIXA a prioridade para priority 50), aqui o mic do
# controle some das sources — o WirePlumber nunca o elege, nem como única fonte
# disponível. Fecha o caso "DualSense é a única fonte available" em que o
# rebaixamento não vence a escassez (ADR-019).
#
# Escopo CIRÚRGICO: casa APENAS o alsa_input (nó de captura/mic). NÃO toca o sink
# (saída/headset) nem desabilita o card inteiro. Trade-off: perde-se a captura do
# headset-jack plugado NO controle. Reversível: remova este arquivo + reinicie o
# WirePlumber.
#
# Coexiste com o 51: se ambos instalados, este vence (disabled > priority). O
# instalador padrão usa um OU outro (--with-wireplumber-fix vs
# --with-wireplumber-disable-mic), mas a coexistência é segura.
#
# WirePlumber >= 0.5 (formato SPA-JSON em ~/.config/wireplumber/wireplumber.conf.d/).
# Aplicado por scripts/fix_wireplumber_default_source.sh --disable-source.

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_input.*[Dd]ual[Ss]ense.*" }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
]
