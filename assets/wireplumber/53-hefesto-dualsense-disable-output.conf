# Hefesto - Dualsense4Unix — FEAT-WIREPLUMBER-DISABLE-SOURCE-MODE-01 (reforço)
#
# DESABILITA (node.disabled = true) a SAÍDA de áudio (sink surround) do DualSense.
# Complementa o 52 (que desabilita o alsa_input/mic): juntos, NENHUM nó de áudio
# do DualSense é criado pelo PipeWire — nem source, nem sink, nem o '.monitor' do
# sink. Fecha a regressão observada (pós-reboot o `.monitor` do output surround do
# DualSense reaparecia como `default-source` — o "mic que voltou"), que o 52
# sozinho não cobre por casar só o alsa_input.
#
# Escopo: casa o alsa_output (saída/headset-jack do controle). O áudio USB segue
# bindado-e-IDLE no kernel (snd-usb-audio) — NÃO há unbind disruptivo (decisão
# 2026-06-26: sem a regra-75; o áudio fica quieto, não removido). Trade-off: o
# DualSense não toca áudio (voz pela webcam C920, áudio pela HDMI). Reversível:
# remova este arquivo + reinicie o WirePlumber (`systemctl --user restart wireplumber`).
#
# WirePlumber >= 0.5 (SPA-JSON em ~/.config/wireplumber/wireplumber.conf.d/).
# Aplicado por scripts/fix_wireplumber_default_source.sh --disable-source.

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output.*[Dd]ual[Ss]ense.*" }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
]
