# hefesto-dualsense4unix — Onda R: re-pareamento resiliente de controle BT.
# Estudo docs/process/estudos/2026-07-19-estudo-bluez-backport-onda-r.md §4.
#
# JustWorksRepairing=always deixa o BlueZ aceitar re-pareamento (pairing) de um
# device que JÁ TEM bond, sem rejeitar por SSP/JustWorks já concluído antes.
# Duas situações exigem isso:
#   1. Migração do backport bluez 5.85 (ONDA-R, passo "BlueZ resiliente" do
#      install): a troca de versão DESCARTA os bonds antigos no 1º start — o
#      controle precisa re-parear, e sem esta opção o BlueZ pode recusar até
#      timeout (upstream 6d55c7d7f: "Device.Pair using wrong address type").
#   2. O bond "meio-salvo" (Paired: yes / Bonded: no) — nasce de "No agent
#      available for request type 2" quando nenhum agente de pareamento D-Bus
#      está registrado no momento (cura complementar: hefesto-bt-agent.service,
#      ver assets/systemd/hefesto-bt-agent.service). Sem JustWorksRepairing,
#      re-parear esse bond capenga também pode ser rejeitado.
#
# FORMA DROP-IN: para /etc/bluetooth/main.conf.d/ QUANDO o BlueZ da máquina
# suportar o diretório — mesmo critério usado para o FastConnectable (ver
# assets/bluetooth/hefesto-fastconnectable.conf). Sem o diretório, o install
# usa o bloco marcado: assets/bluetooth/hefesto-justworks.block.
#
# Vale no próximo start do bluetoothd — o install NUNCA força restart do
# serviço por causa deste passo (derrubaria os controles BT conectados;
# regra provada ao vivo em 2026-07-17). A ÚNICA exceção documentada é o
# postinst do próprio pacote bluez quando o backport ONDA-R troca a versão.
# Instalado/removido pelo install/uninstall do hefesto (default, sem flag).
[General]
JustWorksRepairing = always
