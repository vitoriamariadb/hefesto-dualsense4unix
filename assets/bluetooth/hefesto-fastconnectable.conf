# hefesto-dualsense4unix — reconexão Bluetooth mais rápida para os controles.
# PLAT-04 item 3 (estudo 2026-07-18-estudo-bt-maximo.md §3/§7 item 5).
#
# FastConnectable=true deixa o page scan agressivo: o adaptador responde mais
# rápido à conexão ENTRANTE (o botão PS do DualSense reconecta em menos tempo).
# Custo documentado no template do BlueZ: só consumo do dongle (irrelevante em
# desktop). NÃO mexe em link já ativo. Opção confirmada no binário do
# bluetoothd 5.72 (strings) e no template main.conf.
#
# FORMA DROP-IN: para /etc/bluetooth/main.conf.d/ QUANDO o BlueZ da máquina
# suportar o diretório (o 5.72 do Pop!_OS 24.04 NÃO tem main.conf.d — nesse
# caso o install usa o bloco marcado: assets/bluetooth/hefesto-fastconnectable.block).
#
# Vale no próximo start do bluetoothd — o install NUNCA força restart do serviço
# (derrubaria os controles BT conectados; provado ao vivo em 2026-07-17).
# Instalado/removido pelo install/uninstall do hefesto (default, sem flag).
[General]
FastConnectable=true
