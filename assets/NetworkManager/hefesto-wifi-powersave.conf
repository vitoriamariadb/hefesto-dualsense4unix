# hefesto-dualsense4unix — Onda W2 (GATEADO POR EVIDÊNCIA, ver install.sh)
#
# Desliga o power save do WiFi (LPS raso do firmware rtw88): em dongles
# Realtek USB (RTL8822BU) o PS do firmware tem histórico de 'failed to
# leave lps state', beacon errors e picos de latência (lwfinger/rtw88
# #402; série original do driver chegou a propor PS desligado em USB).
# O deep PS NÃO é o alvo: em USB ele nunca engaja (rtw_usb_deep_ps é
# função vazia) — por isso NÃO existe conf de disable_lps_deep aqui.
#
# ESTE ARQUIVO SÓ É INSTALADO APÓS a medição A/B do scripts/medir_w2_lps.sh
# provar ganho (powersave=2 vence =3 em p95/perda sem regressão de
# throughput). Instalado em /etc/NetworkManager/conf.d/ pelo install.sh
# (opt-in --wifi-powersave-off até a evidência virar default); removido
# pelo uninstall.sh (simétrico). Vence o default-wifi-powersave-on.conf
# do sistema por ordem lexicográfica dentro de conf.d.
#
# 2 = disable, 3 = enable (default da distro).
[connection.hefesto-wifi-powersave]
match-device=type:wifi
wifi.powersave=2
