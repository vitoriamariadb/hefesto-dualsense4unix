# hefesto-dualsense4unix — o btusb liga USB autosuspend no adaptador Bluetooth no
# probe (enable_autosuspend default Y — provado por modinfo neste kernel). Em máquina
# sem usbcore.autosuspend=-1 global isso põe o rádio dos controles para dormir.
# Esta opção corta na raiz, para QUALQUER adaptador (inclusive composite classe ef
# que escapa da regra udev por classe e0). Vale a partir do próximo probe (replug
# ou reboot); a cura imediata no runtime é a regra udev 81 (power/control=on).
#
# PLAT-04 item 1 (estudos 2026-07-18: bt-maximo §3/§7 e kernel-hardening §5).
# Instalado/removido pelo install/uninstall do hefesto (default, sem flag).
# REVERSÍVEL: apague este arquivo + replugue o adaptador (ou reboot).
options btusb enable_autosuspend=0
