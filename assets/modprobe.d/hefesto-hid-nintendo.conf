# hefesto-dualsense4unix — opções do hid-nintendo patchado (Onda T; instalado
# pelo install.sh, removido pelo uninstall.sh — NÃO editar à mão).
#
# bt_probe_retries=3: cura da morte por probe BT (-110/-ETIMEDOUT) medida 3x
# nesta máquina (o HID não re-proba; sem retry o controle some até power-cycle).
# Só o módulo DKMS do hefesto conhece os parâmetros; se o in-tree carregar no
# lugar (fail-safe), o kernel apenas loga "unknown parameter 'bt_probe_retries'
# ignored" e o módulo sobe normalmente — nunca ficamos sem controle.
#
# skip_tx_on_rate_exceeded=1: não transmitir após "exceeded max attempts"
# (transmitir sem janela segura é o que o comentário do próprio driver diz
# que derruba o link BT). No MÓDULO o default é 0 (== vanilla, transmitir);
# a mudança de comportamento é opt-in DAQUI e reversível AO VIVO, sem
# recompilar: echo 0 | sudo tee /sys/module/hid_nintendo/parameters/skip_tx_on_rate_exceeded
# (validação A/B do checklist da Onda T usa exatamente esse knob).
#
# register_leds_on_set_failure=1 (fix 21/07): registra os LED class devices
# mesmo quando o SET inicial falha (-110 em BT congestionado). Sem isso o
# controle fica SEM LEDs de player pela conexão inteira ("Failed to set
# players LEDs, skipping registration" — medido ao vivo no Pro Controller
# com 4 controles BT: o link se recuperou segundos depois, mas não havia
# nó de LED para o daemon curar). Registrar é operação local; a próxima
# escrita de brightness (atribuição de player do hefesto) conserta.
#
# Tuning p/ rádio congestionado (medição 21/07: probe com 13x "timeout
# waiting for input report" + IMU dropando 30-40% com 4 controles BT):
#   sync_send_tries=4        (vanilla 2)  — mais tentativas por subcomando;
#   input_report_wait_ms=500 (vanilla 250) — espera maior por janela de TX;
#   probe_info_timeout_ms=4000 (vanilla 2000) — info do probe com folga.
# Reversível ao vivo via /sys/module/hid_nintendo/parameters/ (sem rebuild).
options hid_nintendo bt_probe_retries=3 skip_tx_on_rate_exceeded=1 register_leds_on_set_failure=1 sync_send_tries=4 input_report_wait_ms=500 probe_info_timeout_ms=4000
