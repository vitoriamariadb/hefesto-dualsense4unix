# hefesto-dualsense4unix — opções do hid-nintendo patchado (Onda T; instalado
# pelo install.sh, removido pelo uninstall.sh — NÃO editar à mão).
#
# bt_probe_retries=3: cura da morte por probe BT (-110/-ETIMEDOUT) medida 3x
# nesta máquina (o HID não re-proba; sem retry o controle some até power-cycle).
# Só o módulo DKMS do hefesto conhece os parâmetros; se o in-tree carregar no
# lugar (fail-safe), o kernel apenas loga "unknown parameter 'bt_probe_retries'
# ignored" e o módulo sobe normalmente — nunca ficamos sem controle.
#
# skip_tx_on_rate_exceeded=1: não transmitir após "exceeded max attempts"
# (transmitir sem janela segura é o que o comentário do próprio driver diz
# que derruba o link BT). No MÓDULO o default é 0 (== vanilla, transmitir);
# a mudança de comportamento é opt-in DAQUI e reversível AO VIVO, sem
# recompilar: echo 0 | sudo tee /sys/module/hid_nintendo/parameters/skip_tx_on_rate_exceeded
# (validação A/B do checklist da Onda T usa exatamente esse knob).
#
# Demais parâmetros ficam nos defaults (== comportamento vanilla); tuning de
# campo ao vivo via /sys/module/hid_nintendo/parameters/.
options hid_nintendo bt_probe_retries=3 skip_tx_on_rate_exceeded=1
