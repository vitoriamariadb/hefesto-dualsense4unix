name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag para re-publicar (ex.: v2.1.0). Permite correr release.yml manualmente contra uma tag existente — útil após fixes de CI (CHORE-CI-REPUBLISH-TAGS-01)."
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.info.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Quando disparado via workflow_dispatch, faz checkout da tag
          # indicada no input em vez de main HEAD.
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          # CI-CACHE-PIP-01 (v3.4.0): pip cache para release pipeline.
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Instalar build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libhidapi-dev libhidapi-hidraw0 libudev-dev libxi-dev
      - name: Verificar anonimato
        run: bash scripts/check_anonymity.sh
      - name: Instalar e testar
        run: |
          pip install -e ".[dev]"
          ruff check src/ tests/
          pytest tests/unit -v
      - name: Build wheel + sdist
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - name: Ler versão
        id: info
        env:
          # Em workflow_dispatch, github.ref_name é o branch/ref do run (ex.: main);
          # o input `tag` tem o valor real (ex.: v2.1.0). Prioriza o input.
          REF_NAME: ${{ github.event.inputs.tag || github.ref_name }}
        run: echo "version=${REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ steps.info.outputs.version }}
          path: dist/

  appimage:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Deps do SO (libfuse2 pra AppImage + librsvg pra PNG)
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 librsvg2-bin \
            libhidapi-dev libhidapi-hidraw0 libudev-dev libxi-dev
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/
      - name: Instalar python-appimage
        run: |
          pip install -e ".[dev]"
          pip install python-appimage build
      - name: Gerar AppImage
        run: bash scripts/build_appimage.sh
      - name: Smoke AppImage
        run: ./dist/appimage/Hefesto-Dualsense4Unix-*-x86_64.AppImage version
      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ needs.build.outputs.version }}
          path: dist/appimage/*.AppImage

  deb:
    runs-on: ubuntu-22.04
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Instalar dpkg-deb (nativo no Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y dpkg
      - name: Build .deb
        run: bash scripts/build_deb.sh
      - name: Upload pacote .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ needs.build.outputs.version }}
          path: dist/*.deb

  deb-install-smoke:
    name: Smoke install do .deb
    # Histórico de iterações:
    # - Sprint 74: runs-on ubuntu-24.04, presumiu pydantic v2 no apt. FALHOU.
    # - Sprint 79.1: runs-on ubuntu-22.04 + pip install pydantic>=2. FALHOU
    #   em v2.2.2 por structlog/typer/platformdirs TAMBEM velhos no Jammy apt.
    # - Sprint 82 (2026-04-24): MIGRACAO para ubuntu-24.04 (Noble). Empirico
    #   confirmou typer 0.9, structlog 24.1, platformdirs 4 modernos; so
    #   pydantic 1.10 do apt exige pip install --user (fix 79.1 preservado).
    #   Noble e runner alvo preferido: LTS mais recente, dep stack moderna
    #   exceto pydantic, zero compat layers arriscadas.
    runs-on: ubuntu-24.04
    needs: [build, deb]
    env:
      VERSION: ${{ needs.build.outputs.version }}
    steps:
      - name: Baixar artifact do .deb
        uses: actions/download-artifact@v4
        with:
          name: deb-${{ needs.build.outputs.version }}
          path: ./dist
      - name: Listar artifact
        run: ls -lah ./dist
      - name: Instalar pydantic v2 + typer moderno via pip
        # Noble 24.04 apt: pydantic 1.10.14 (precisa v2), typer 0.9.0
        # (precisa 0.12+ para PEP 604 'int | None' em cli/app.py).
        # Empirico 2026-04-24 (docker ubuntu:24.04): pydantic>=2 + typer>=0.12
        # + deps apt = hefesto CLI carrega, 'hefesto-dualsense4unix version' imprime 2.2.2.
        # --break-system-packages: Noble e PEP 668.
        run: |
          python3 -m pip install --user --break-system-packages --upgrade 'pydantic>=2.0' 'typer>=0.12'
      - name: Instalar .deb via apt (resolve deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y ./dist/hefesto-dualsense4unix_*_amd64.deb
      - name: Validar binário hefesto-dualsense4unix
        run: |
          which hefesto-dualsense4unix
          # Expor pydantic v2 + typer 0.12+ do pip --user para o hefesto-dualsense4unix
          # (instalado em /usr/lib/python3/dist-packages). PYTHONPATH coloca o
          # user site ANTES do dist-packages para os imports resolverem as
          # versões modernas primeiro. Subcomando correto e 'hefesto-dualsense4unix version',
          # não '--version' (não existe como top-level option).
          USER_SITE="$(python3 -m site --user-site)"
          echo "USER_SITE=$USER_SITE"
          PYTHONPATH="$USER_SITE" hefesto-dualsense4unix version
      - name: Validar binário hefesto-dualsense4unix-gui
        run: |
          which hefesto-dualsense4unix-gui
          # --help em runner headless pode falhar por falta de DISPLAY/GTK;
          # o critério é localizar o binário. Exit não-zero aqui é aceitável.
          USER_SITE="$(python3 -m site --user-site)"
          PYTHONPATH="$USER_SITE" hefesto-dualsense4unix-gui --help || echo "hefesto-dualsense4unix-gui --help retornou não-zero em headless (esperado)"
      - name: Desinstalar (valida postrm)
        run: sudo apt-get remove -y hefesto-dualsense4unix

  flatpak:
    name: Build Flatpak bundle
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - name: Instalar dependências do sistema
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            flatpak \
            flatpak-builder \
            python3-pip \
            python3-build \
            libhidapi-dev \
            libudev-dev
      - name: Adicionar remote Flathub
        run: |
          flatpak remote-add --user --if-not-exists \
            flathub https://dl.flathub.org/repo/flathub.flatpakrepo
      - name: Instalar runtime GNOME//47
        run: |
          flatpak install --user -y flathub \
            org.gnome.Platform//47 \
            org.gnome.Sdk//47
      - name: Construir wheel Python
        run: |
          pip3 install build
          python3 -m build --wheel --outdir dist/
      - name: Construir Flatpak
        run: |
          flatpak-builder \
            --user \
            --force-clean \
            --repo=flatpak-repo \
            flatpak-build-dir \
            flatpak/br.andrefarias.Hefesto.yml
      - name: Exportar bundle .flatpak
        run: |
          flatpak build-bundle \
            flatpak-repo \
            Hefesto-Dualsense4Unix.flatpak \
            br.andrefarias.Hefesto
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-${{ needs.build.outputs.version }}
          path: Hefesto-Dualsense4Unix.flatpak
          if-no-files-found: error

  github-release:
    needs: [build, appimage, deb, deb-install-smoke, flatpak]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: appimage-${{ needs.build.outputs.version }}
          path: dist/appimage/
      - uses: actions/download-artifact@v4
        with:
          name: deb-${{ needs.build.outputs.version }}
          path: dist/deb/
      - uses: actions/download-artifact@v4
        with:
          name: flatpak-${{ needs.build.outputs.version }}
          path: dist/flatpak/
      - name: Extrair seção da release do CHANGELOG
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          # Extrai do CHANGELOG só a seção desta versão: "## [VERSION]" até
          # próxima "## [" (ou EOF). Padrão Keep a Changelog.
          # Sem --notes-file CHANGELOG.md inteiro (~750 linhas, ridiculo).
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { p=1; print; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          echo "---NOTES PREVIEW---"
          head -20 /tmp/release-notes.md
          echo "..."
          wc -l /tmp/release-notes.md
      - name: Criar release no GitHub
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "Hefesto - Dualsense4Unix v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            dist/hefesto_dualsense4unix-*.whl dist/hefesto_dualsense4unix-*.tar.gz \
            dist/appimage/*.AppImage \
            dist/deb/*.deb \
            dist/flatpak/*.flatpak

  pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    if: ${{ vars.PYPI_PUBLISH == 'true' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.build.outputs.version }}
          path: dist/
      - name: Publicar no PyPI (OIDC trusted publisher)
        uses: pypa/gh-action-pypi-publish@release/v1
