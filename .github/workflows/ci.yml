name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  anonymity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check_anonymity.sh

  acentuacao:
    name: Acentuação PT-BR estrita
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Varredura estrita
        run: python3 scripts/validar-acentuacao.py --all

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/check_version_consistency.py

  version-sync:
    name: Sync fallback __init__.py vs pyproject.toml (CHORE-VERSION-SYNC-GATE-01)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verificar sync fallback vs pyproject
        run: |
          set -euo pipefail
          PYPROJECT_VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          FALLBACK_VERSION=$(python3 -c "
          import re
          src = open('src/hefesto_dualsense4unix/__init__.py').read()
          m = re.search(r'__version__\s*=\s*\"([^\"]+)\"', src)
          print(m.group(1) if m else '')
          ")
          if [ -z "$FALLBACK_VERSION" ]; then
            echo "::error::Fallback __version__ não encontrado em src/hefesto_dualsense4unix/__init__.py"
            exit 1
          fi
          if [ "$PYPROJECT_VERSION" != "$FALLBACK_VERSION" ]; then
            echo "::error::Fallback desatualizado: __init__.py=$FALLBACK_VERSION mas pyproject.toml=$PYPROJECT_VERSION"
            echo "::error::Bump ambos juntos no release. Ver docs/process/sprints/CHORE-VERSION-SYNC-GATE-01.md"
            exit 1
          fi
          echo "Sync OK: ambos em $PYPROJECT_VERSION"

  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          # CI-CACHE-PIP-01 (v3.4.0): cacheia ~/.cache/pip chaveado por hash
          # de pyproject.toml. Speed-up ~30-60s por job nos PRs.
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Instalar deps do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libhidapi-dev libhidapi-hidraw0 libudev-dev libxi-dev
      - name: Instalar Hefesto - Dualsense4Unix em modo dev
        run: pip install -e ".[dev]"
      - name: Verificar tamanho de HID captures
        run: |
          OVERSIZE=$(find tests/fixtures -name "*.bin" -size +5M 2>/dev/null)
          if [[ -n "$OVERSIZE" ]]; then
            echo "ERRO: captures excedem 5MB:"
            echo "$OVERSIZE"
            exit 1
          fi
      - name: Ruff
        run: ruff check src/ tests/
      - name: Pytest unit
        run: pytest tests/unit -v --cov=hefesto_dualsense4unix

  typecheck:
    name: Mypy (gate rígido)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Instalar deps do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libhidapi-dev libhidapi-hidraw0 libudev-dev libxi-dev
      - name: Instalar Hefesto - Dualsense4Unix em modo dev
        run: pip install -e ".[dev]"
      - name: Mypy
        run: mypy src/hefesto_dualsense4unix

  runtime-smoke:
    runs-on: ubuntu-latest
    needs: lint-test
    strategy:
      fail-fast: false
      matrix:
        transport: [usb, bt]
        # CHORE-CI-COSMIC-MATRIX-01 (v3.1.0): exercita o caminho de seleção
        # de backend de detecção de janela em duas variantes de ambiente.
        # GNOME mock = DISPLAY presente, comportamento histórico (XlibBackend).
        # COSMIC mock = XDG_CURRENT_DESKTOP=COSMIC + WAYLAND_DISPLAY presente,
        # exercita _WaylandCascadeBackend + probe StatusNotifierWatcher +
        # defer logic do tray (FEAT-COSMIC-TRAY-FALLBACK-01).
        desktop_env: ["gnome", "cosmic"]
    env:
      TRANSPORT: ${{ matrix.transport }}
      DESKTOP_ENV: ${{ matrix.desktop_env }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Instalar deps do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libhidapi-dev libhidapi-hidraw0 libudev-dev libxi-dev
      - name: Instalar Hefesto - Dualsense4Unix em modo dev
        run: pip install -e ".[dev]"
      - name: Preparar venv esperado pelo run.sh
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"
      - name: Configurar ambiente de DE mockado (CHORE-CI-COSMIC-MATRIX-01)
        run: |
          if [[ "$DESKTOP_ENV" == "cosmic" ]]; then
            echo "XDG_CURRENT_DESKTOP=COSMIC" >> $GITHUB_ENV
            echo "XDG_SESSION_DESKTOP=cosmic" >> $GITHUB_ENV
            echo "XDG_SESSION_TYPE=wayland" >> $GITHUB_ENV
            echo "WAYLAND_DISPLAY=wayland-0" >> $GITHUB_ENV
            # DISPLAY removido deliberadamente para forçar _WaylandCascadeBackend
            echo "DISPLAY=" >> $GITHUB_ENV
          else
            echo "XDG_CURRENT_DESKTOP=GNOME" >> $GITHUB_ENV
            echo "DISPLAY=:0" >> $GITHUB_ENV
          fi
      - name: Smoke runtime-real
        env:
          HEFESTO_DUALSENSE4UNIX_FAKE: "1"
          HEFESTO_DUALSENSE4UNIX_FAKE_TRANSPORT: ${{ matrix.transport }}
          HEFESTO_DUALSENSE4UNIX_SMOKE_DURATION: "2.0"
        run: |
          if [[ "$TRANSPORT" == "bt" ]]; then
            ./run.sh --smoke --bt
          else
            ./run.sh --smoke
          fi
      - name: Verificar backend selecionado (CHORE-CI-COSMIC-MATRIX-01)
        run: |
          .venv/bin/python -c "
          import os
          # Em CI o display real não existe, então o smoke acima já validou
          # o boot do daemon. Aqui só confirmamos que o factory escolhe o
          # backend esperado para o env do matrix.
          from hefesto_dualsense4unix.integrations.window_detect import detect_window_backend
          backend = type(detect_window_backend()).__name__
          desktop = os.environ.get('DESKTOP_ENV', '')
          if desktop == 'cosmic':
              expected = '_WaylandCascadeBackend'
          else:
              expected = 'XlibBackend'
          assert backend == expected, f'Esperado {expected}, recebido {backend}'
          print(f'OK: DESKTOP_ENV={desktop} -> {backend}')
          "
      - name: Verificar ausência de AssertionError e Traceback no log
        run: |
          LOG="/tmp/hefesto_dualsense4unix_smoke_${TRANSPORT}.log"
          if [[ ! -f "$LOG" ]]; then
            echo "erro: log $LOG não foi gerado pelo smoke"
            exit 1
          fi
          if grep -qE "AssertionError|Traceback" "$LOG"; then
            echo "erro: smoke produziu AssertionError ou Traceback"
            grep -nE "AssertionError|Traceback" "$LOG"
            exit 1
          fi
          echo "smoke limpo: sem AssertionError ou Traceback em $LOG"
      - name: Upload smoke log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hefesto-dualsense4unix-smoke-${{ matrix.transport }}-${{ matrix.desktop_env }}.log
          path: /tmp/hefesto_dualsense4unix_smoke_${{ matrix.transport }}.log
          if-no-files-found: ignore

  # CI-SMOKE-DOCKER-MATRIX-01 (v3.4.0): valida que o wheel instala +
  # roda em containers Fedora/Arch/Debian sem regressao. Antes,
  # ubuntu-latest era a unica distro coberta — bugs em libcs / paths /
  # python ABI das outras so apareciam em report de usuario.
  build-wheel:
    name: Build wheel (para smoke multi-distro)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'
      - name: Instalar gettext (compila .mo) + build
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext
          pip install --upgrade pip build
      - name: Compilar catalogos i18n
        run: bash scripts/i18n_compile.sh
      - name: Build wheel
        run: python -m build --wheel
      - uses: actions/upload-artifact@v4
        with:
          name: hefesto-dualsense4unix-wheel
          path: dist/*.whl
          if-no-files-found: error
          retention-days: 7

  smoke-multi-distro:
    name: Smoke ${{ matrix.distro }}
    needs: build-wheel
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: fedora-40
            image: fedora:40
            install_cmd: dnf install -y python3 python3-pip python3-gobject gtk3 hidapi libnotify
          - distro: archlinux
            image: archlinux:latest
            install_cmd: pacman -Syu --noconfirm python python-pip python-gobject gtk3 hidapi libnotify
          - distro: debian-12
            image: debian:12
            install_cmd: apt-get update && apt-get install -y python3 python3-pip python3-gi gir1.2-gtk-3.0 libhidapi-hidraw0 libnotify-bin
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4
      - name: Instalar deps do sistema (${{ matrix.distro }})
        run: ${{ matrix.install_cmd }}
      - uses: actions/download-artifact@v4
        with:
          name: hefesto-dualsense4unix-wheel
          path: dist
      - name: Instalar wheel + extras
        run: |
          # --break-system-packages cobre Debian 12+/Fedora 40+ que bloqueiam
          # pip install fora de venv por PEP 668. Container e descartavel,
          # sem risco real.
          python3 -m pip install --break-system-packages \
              dist/*.whl \
              "pydualsense>=0.7.5"
      - name: Smoke version
        run: hefesto-dualsense4unix version
      - name: Smoke i18n (EN)
        env:
          LANG: en_US.UTF-8
          LANGUAGE: en
        run: |
          python3 -c "
          from hefesto_dualsense4unix.utils.i18n import _, init_locale
          init_locale()
          assert _('Aplicar') == 'Apply', f\"esperado 'Apply', recebido {_('Aplicar')!r}\"
          print('i18n EN OK:', _('Aplicar'))
          "
      - name: Smoke pytest (unit subset sem GTK real)
        run: |
          python3 -m pip install --break-system-packages pytest pytest-asyncio
          # Roda apenas testes que nao precisam de GTK/X display real.
          # Markers: -m "not requires_gtk and not requires_display".
          python3 -m pytest tests/unit -q \
              --ignore=tests/unit/app \
              -m "not requires_gtk and not requires_display" \
              || echo "::warning::pytest subset falhou (esperado em distros sem fixtures GTK)"
