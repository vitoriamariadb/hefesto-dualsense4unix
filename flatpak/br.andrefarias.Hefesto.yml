# Manifest Flatpak — Hefesto - Dualsense4Unix
# App ID: br.andrefarias.Hefesto (preservado por design no rebrand v3.0.0)
# Runtime: org.gnome.Platform//47 (GTK3, PyGObject, python3 3.12, gi-repository)
# Construção local: scripts/build_flatpak.sh
# CI: .github/workflows/flatpak.yml
#
# Histórico de runtime:
#   - v2.3.x: GNOME Platform//45 — deps Python quase todas ausentes (bug).
#   - v2.4.0 (2026-04-24): GNOME Platform//47 + deps Python completas como
#     módulo `hefesto-deps`. Fix para BUG-FLATPAK-DEPS-01 (gi/pydantic
#     ausentes ao abrir hefesto-gui em instalação recém-feita).
#   - v3.0.0 rebrand (2026-04-27): paths internos hefesto -> hefesto-dualsense4unix;
#     command -> hefesto-dualsense4unix-gui; runtime e deps mantidos.

app-id: br.andrefarias.Hefesto
runtime: org.gnome.Platform
runtime-version: "47"
sdk: org.gnome.Sdk

# Ponto de entrada principal — GUI GTK3
command: hefesto-dualsense4unix-gui

# Permissões de sandbox
finish-args:
  # Compartilhamento IPC entre processos (necessário para GTK X11)
  - --share=ipc
  # Suporte a X11 com fallback se Wayland não disponível
  - --socket=fallback-x11
  # Suporte a Wayland nativo (COSMIC, GNOME)
  - --socket=wayland
  # Acesso ao D-Bus de sessão (portals, notificações)
  - --socket=session-bus
  # Acesso a todos os dispositivos: hidraw (DualSense) + uinput (emulação de mouse/gamepad)
  # Nota: --device=input não basta para /dev/hidraw*; usar --device=all
  - --device=all
  # Socket IPC do daemon Hefesto - Dualsense4Unix em $XDG_RUNTIME_DIR/hefesto-dualsense4unix/
  - --filesystem=xdg-run/hefesto-dualsense4unix:create
  # Perfis e configurações em ~/.config/hefesto-dualsense4unix/
  # Dentro do sandbox: ~/.var/app/br.andrefarias.Hefesto/config/hefesto-dualsense4unix/
  - --filesystem=xdg-config/hefesto-dualsense4unix:create
  # Portals do freedesktop (notificações, tray, background, window tracking)
  - --talk-name=org.freedesktop.portal.*

modules:
  # Módulo 1: todas as dependências Python do Hefesto - Dualsense4Unix num único pip install.
  #
  # Por que consolidado: o wheel `hefesto-dualsense4unix` é instalado com
  # `--no-deps` no módulo 3 (para evitar recursão de resolver do pip sobre
  # deps já dentro do runtime). Portanto as deps declaradas em
  # `pyproject.toml` precisam ser empurradas explicitamente aqui. Inclui
  # `python-uinput` e `pydualsense` que antes estavam em módulos separados.
  #
  # `--share=network` é necessário porque o Flathub build farm baixa os
  # wheels do PyPI. Alternativa offline seria cravar `type: file` + sha256
  # para cada wheel (~15 arquivos, 4 MiB), mas o overhead de atualização
  # das hashes a cada bump não compensa o benefício marginal de
  # reprodutibilidade.
  - name: hefesto-deps
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
    build-commands:
      # BUG-FLATPAK-PYGMENTS-MISSING-01 (v3.2.0): `rich.markdown.Markdown`
      # importa `pygments.lexer` para syntax highlighting; sem pygments
      # no sandbox, qualquer `hefesto-dualsense4unix --help` quebra com
      # ModuleNotFoundError via except_hook do Typer.
      #
      # Detalhe sutil: pygments existe no `org.gnome.Sdk//47` (build time)
      # mas NÃO no `org.gnome.Platform//47` (runtime). Sem `--ignore-installed`,
      # o pip detecta pygments no /usr/lib do SDK e pula a instalação em
      # /app/, deixando o runtime do usuário órfão. `--ignore-installed`
      # força o bundling em /app para sobreviver à troca SDK->Platform.
      - pip3 install --prefix=/app --no-build-isolation
          --ignore-installed
          "pydualsense>=0.7.5"
          "python-uinput"
          "textual>=0.47"
          "typer>=0.9"
          "pydantic>=2.0"
          "python-xlib>=0.33"
          "evdev>=1.6"
          "structlog>=23.0"
          "rich>=13.0"
          "pygments>=2.17"
          "platformdirs>=4.0"
          "filelock>=3.13"
          "jeepney>=0.8"
    sources: []

  # Módulo intermediário: libhidapi — biblioteca nativa que o wrapper Python
  # `hidapi-usb` carrega via `ctypes.CDLL("libhidapi-hidraw.so")`.
  # BUG-FLATPAK-HIDAPI-MISSING-01 (v3.2.0): `org.gnome.Platform//47` NÃO inclui
  # libhidapi. Sem este módulo, `import pydualsense` falha com
  # `OSError: Could not find any hidapi library` antes do controle aparecer
  # para o daemon. Build upstream do github (cmake + libusb-1.0 + udev — todos
  # presentes no Sdk).
  - name: hidapi
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DHIDAPI_BUILD_HIDTEST=OFF
      # libusb-1.0 NÃO está no GNOME Sdk//47 (built-in só udev/hidraw stack).
      # DualSense USB+BT funciona 100% via hidraw, então OFF é safe.
      - -DHIDAPI_WITH_LIBUSB=OFF
      - -DHIDAPI_WITH_HIDRAW=ON
      # CMake default em x86_64 instala em /app/lib64; o wrapper Python
      # `hidapi.py` (ctypes) procura em /app/lib via `LD_LIBRARY_PATH`
      # padrão do Flatpak. Forçar `lib` evita symlink manual no build-commands.
      - -DCMAKE_INSTALL_LIBDIR=lib
    sources:
      - type: archive
        url: https://github.com/libusb/hidapi/archive/refs/tags/hidapi-0.14.0.tar.gz
        sha256: a5714234abe6e1f53647dd8cba7d69f65f71c558b7896ed218864ffcf405bcbd
    cleanup:
      - /include
      - /lib/pkgconfig
      - /lib/cmake

  # Módulo 2: wlrctl — CLI wayland wlroots usado por WlrctlBackend
  # (BUG-COSMIC-WLR-BACKEND-01). No fluxo .deb vem via Recommends do apt;
  # no sandbox do Flatpak precisa ser bundlado para que
  # shutil.which("wlrctl") retorne /app/bin/wlrctl dentro da sandbox.
  #
  # Upstream: https://git.sr.ht/~brocellous/wlrctl (tag v0.2.2).
  # Deps (probadas empiricamente em org.gnome.Sdk//47): xkbcommon,
  # wayland-client, wayland-scanner. Os XMLs de wayland-protocols ficam
  # bundlados no próprio repositório do wlrctl, então não depende de
  # wayland-protocols do sistema.
  #
  # -Dwerror=false defensivo: wlrctl compila com -Werror por padrão;
  # uma versão de compilador mais nova no SDK pode introduzir warnings
  # e quebrar o build. Desligar o werror blinda o bundling.
  - name: wlrctl
    buildsystem: meson
    config-opts:
      - --buildtype=release
      - -Dwerror=false
    sources:
      - type: archive
        url: https://git.sr.ht/~brocellous/wlrctl/archive/v0.2.2.tar.gz
        sha256: b5b3836091c41de09a832df1e5eb4747841d7ae670367e413487d5be7a5f2849
    cleanup:
      - /share/man

  # Módulo 3: Hefesto - Dualsense4Unix — instalação do wheel local com --no-deps
  - name: hefesto
    buildsystem: simple
    build-commands:
      # Instalar o wheel pré-construído (gerado por 'python -m build' no script).
      # --no-deps porque o módulo `hefesto-deps` acima já empurrou tudo.
      - pip3 install --prefix=/app --no-deps ./dist/*.whl

      # Instalar ícone 256x256 para o lançador do sistema
      - install -Dm644 assets/appimage/Hefesto-Dualsense4Unix.png
          /app/share/icons/hicolor/256x256/apps/br.andrefarias.Hefesto.png

      # Instalar arquivo .desktop adaptado para o App ID Flatpak
      - install -Dm644 flatpak/br.andrefarias.Hefesto.desktop
          /app/share/applications/br.andrefarias.Hefesto.desktop

      # Instalar metadata AppStream
      - install -Dm644 flatpak/br.andrefarias.Hefesto.metainfo.xml
          /app/share/metainfo/br.andrefarias.Hefesto.metainfo.xml

      # Copiar regras udev para dentro do bundle (leitura apenas)
      # Instalação no host via scripts/install-host-udev.sh + pkexec.
      # Conjunto canônico (v3.3.1+): TODAS as 5 regras + modules-load para
      # uinput. Sincronizado com scripts/install_udev.sh do source-install
      # (assets/ é fonte única de verdade).
      - install -Dm644 assets/70-ps5-controller.rules
          /app/share/hefesto-dualsense4unix/udev-rules/70-ps5-controller.rules
      - install -Dm644 assets/71-uinput.rules
          /app/share/hefesto-dualsense4unix/udev-rules/71-uinput.rules
      - install -Dm644 assets/72-ps5-controller-autosuspend.rules
          /app/share/hefesto-dualsense4unix/udev-rules/72-ps5-controller-autosuspend.rules
      - install -Dm644 assets/73-ps5-controller-hotplug.rules
          /app/share/hefesto-dualsense4unix/udev-rules/73-ps5-controller-hotplug.rules
      - install -Dm644 assets/74-ps5-controller-hotplug-bt.rules
          /app/share/hefesto-dualsense4unix/udev-rules/74-ps5-controller-hotplug-bt.rules
      - install -Dm644 assets/hefesto-dualsense4unix.conf
          /app/share/hefesto-dualsense4unix/modules-load/hefesto-dualsense4unix.conf

      # Instalar script de setup de udev (executado pelo usuário uma vez)
      - install -Dm755 scripts/install-host-udev.sh
          /app/bin/install-host-udev.sh

      # FEAT-I18N-CATALOGS-01 (v3.4.0): instala catalogos .mo em
      # /app/share/locale/ (candidate path #4 do utils/i18n.py). O loop
      # encontra cada idioma em locale/<lang>/LC_MESSAGES/<dom>.mo do
      # source tree (gerado por scripts/i18n_compile.sh antes do build).
      # Tolerante a ausencia (|| true) para nao bloquear o flatpak-builder
      # quando o repo foi clonado sem rodar i18n_compile primeiro.
      - |
        if [ -d locale ]; then
          for lang_dir in locale/*/; do
            [ -d "$lang_dir" ] || continue
            lang="$(basename "$lang_dir")"
            mo="${lang_dir}LC_MESSAGES/hefesto-dualsense4unix.mo"
            [ -f "$mo" ] && install -Dm644 "$mo" \
              "/app/share/locale/${lang}/LC_MESSAGES/hefesto-dualsense4unix.mo"
          done
        fi

    sources:
      # Código-fonte local (usado pelo flatpak-builder com --force-clean)
      - type: dir
        path: ..
